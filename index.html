<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Quest AR Snapshot & Draw</title>
    <style>
        body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: black; }
        #renderCanvas { width: 100%; height: 100%; touch-action: none; }
        
        /* 状态栏：在 Quest 里建议放在顶部，不要遮挡视线 */
        #status {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 8px 12px;
            font-family: Arial, sans-serif;
            font-size: 14px;
            pointer-events: none;
            border-radius: 4px;
            z-index: 10;
        }

        /* 隐藏原始视频，但必须存在于 DOM 中 */
        #cameraVideo {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        /* 右下角的小预览图，用于调试 */
        #snapshotPreview {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 160px;
            height: 90px;
            border: 2px solid white;
            background: #222;
            z-index: 5;
            display: none; /* 如果不需要在手机屏幕上看到预览，可以设为 none */
        }
    </style>
</head>
<body>

    <div id="status">Status: Initializing...</div>
    
    <video id="cameraVideo" autoplay muted playsinline></video>
    
    <canvas id="snapshotPreview"></canvas>
    <canvas id="renderCanvas"></canvas>

    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <script src="js/app.js"></script> </body>
</html>
