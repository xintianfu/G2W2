<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
  />
  <title>Quest AR Hand Tracking</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="status">状态：正在加载...</div>

  <canvas id="renderCanvas"></canvas>
  <video id="cameraVideo" playsinline muted autoplay></video>
  <canvas id="snapshotPreview" width="512" height="512"></canvas>

  <div id="helpPanel">
    <div><b>使用方法</b></div>
    <div>1. 点击页面里的 <b>START AR</b> / <b>ENTER AR</b></div>
    <div>2. 右手 pinch：截图</div>
    <div>3. 左手靠近面板 pinch：抓取并移动</div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
