<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>Quest 3 Snapshot Panel MVP</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="ui">
    <div class="panel">
      <h1>Quest 3 Snapshot Panel</h1>
      <p>
        电脑调试：
        <br />
        1. Start Camera
        <br />
        2. Take Snapshot
        <br />
        3. Draw ON/OFF
      </p>
      <p>
        Quest 3：
        <br />
        1. Start Camera
        <br />
        2. 进入 AR
        <br />
        3. 用 pinch 触发截图
      </p>

      <div class="row">
        <button id="startCameraBtn">Start Camera</button>
        <button id="takeSnapshotBtn">Take Snapshot</button>
        <button id="toggleDrawBtn">Draw: OFF</button>
        <button id="clearBtn">Clear Ink</button>
        <button id="saveSnapshotBtn">Save PNG</button>
      </div>

      <p id="status">Status: idle</p>
      <p class="hint">
        Draw OFF：点击/按住 panel = 跟随到前面
        <br />
        Draw ON：在 panel 上画线
        <br />
        Quest 中可用 pinch 触发 snapshot
      </p>
    </div>
  </div>

  <video id="cameraVideo" autoplay playsinline muted></video>
  <canvas id="snapshotPreview"></canvas>
  <canvas id="renderCanvas"></canvas>

  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdn.babylonjs.com/gui/babylon.gui.min.js"></script>
  <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
