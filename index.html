<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Quest AR Snapshot & Draw</title>
    <style>
        /* 基础样式：全屏并禁止滚动 */
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* 画布占据全屏 */
        #renderCanvas {
            width: 100%; height: 100%;
            touch-action: none;
            display: block;
        }

        /* 状态文字：左上角 */
        #status {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ff00; /* 亮绿色，Quest里更显眼 */
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 16px;
            pointer-events: none;
            border-radius: 8px;
            z-index: 100;
            border: 1px solid #333;
        }

        /* 隐藏视频流 */
        #cameraVideo {
            position: absolute;
            width: 1px; height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        /* 调试用的预览 Canvas：右下角 */
        #snapshotPreview {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 200px;
            height: auto;
            border: 2px solid #555;
            background: #111;
            z-index: 50;
            display: block; /* 调试时建议开启，看到图变了说明逻辑通了 */
        }
    </style>
</head>
<body>

    <div id="status">Status: Initializing...</div>
    
    <video id="cameraVideo" autoplay muted playsinline></video>
    
    <canvas id="snapshotPreview"></canvas>

    <canvas id="renderCanvas"></canvas>

    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    
    <script src="app.js"></script> 

</body>
</html>
